name: CI

on:
  push:
    branches: [main]
    paths: ["winiso-rs/**"]
  pull_request:
    paths: ["winiso-rs/**"]

defaults:
  run:
    working-directory: winiso-rs

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --all-targets
      - run: cargo test
      - run: cargo clippy -- -D warnings

  build:
    needs: check
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: winiso-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: winiso-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: winiso-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            name: winiso-macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/winiso ${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: winiso-rs/${{ matrix.name }}
